<h2 mat-dialog-title>Filters
  <span fxFlex></span>
  <span class="close-btn" align="end" (click)="dialogRef.close()">
    <mat-icon>close</mat-icon>
  </span>
</h2>

<form [formGroup]="filterForm" (ngSubmit)="applyFilter()">
  <mat-dialog-content class="mat-typography">
    <div fxLayout="row wrap" fxLayoutGap="20px">

      <mat-form-field>
        <mat-label>Select Store</mat-label>
        
        <mat-select formControlName="store_id" (selectionChange)="setSelectedChanges($event)" [disableOptionCentering]="true">
          <mat-option *ngFor="let store of stores; let i=index" [value]="store.store_id">
            {{store.name}}
          </mat-option>
        </mat-select>

      </mat-form-field>

      <mat-form-field>
        <mat-label>Discount Type</mat-label>
        <mat-select formControlName="type" [disableOptionCentering]="true" (selectionChange)="setSelectedChanges($event)">
        <mat-option *ngFor="let value of discount_types; let i=index" [value]="value.value">{{value.item}}</mat-option>
        </mat-select>
      </mat-form-field>

      <!-- (click)="storeTempValue('type')" -->

      <mat-form-field>
        <mat-label>Status</mat-label>
        <mat-select formControlName="status" [disableOptionCentering]="true" (selectionChange)="setSelectedChanges($event)">
          <mat-option *ngFor="let value of discount_status" [value]="value.value">
            {{value.item}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Discount value</mat-label>
        <mat-select formControlName="values" multiple [disableOptionCentering]="true" (selectionChange)="setSelectedChanges($event)">
          <mat-option *ngFor="let value of discount_value" [value]="value.value[0]">
            {{value.item}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      

    </div>

  </mat-dialog-content>
  <mat-dialog-actions align="start" class="mat-dialog-footer-custom">
    <button type="submit" class="ok-button" mat-raised-button color="primary">APPLY FILTER</button>
    <button (click)="close()" mat-button color="primary" class="cancel-button">CLEAR FILTER</button>
  </mat-dialog-actions>
</form>
